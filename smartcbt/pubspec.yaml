name: smartcbt
description: SmartCBT portal with role-based dashboards, exams, messaging, and multi-school support
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.0.3
  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # Web only optional (ensure the app can run on web too)
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.12

flutter:
  uses-material-design: true